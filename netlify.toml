[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Omit public-config env vars from secret scanning. NEXT_PUBLIC_SITE_URL is a
# public URL consumed by sitemap/robots, and SUPABASE_S3_REGION is a public
# region string baked into the AWS SDK — neither is an actual credential.
# Real secrets (DATABASE_URI, PAYLOAD_SECRET, access/secret keys) are still
# fully scanned across all source code and build output.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,SUPABASE_S3_REGION"

# OpenNext runtime handles SSR, API routes, ISR, and image optimization automatically.
# No plugin pin needed — Netlify auto-updates the adapter on each build.
