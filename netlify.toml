[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Omit build artifacts from secrets scanning. Next.js bakes env vars into
# generated sitemap/robots output, and the AWS SDK bundles region defaults —
# neither is a real secret, but the scanner would otherwise block the build.
# Source code is still fully scanned.
  SECRETS_SCAN_OMIT_PATHS = ".netlify node_modules"

# OpenNext runtime handles SSR, API routes, ISR, and image optimization automatically.
# No plugin pin needed — Netlify auto-updates the adapter on each build.
