[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# These env var names are flagged by Netlify's secrets scanner even though their
# values are public (region, bucket, site URL). The scanner blocks the build when
# it finds them in bundled JS output. Omit them so the build can proceed.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_S3_REGION SUPABASE_STORAGE_BUCKET NEXT_PUBLIC_SITE_URL"

# OpenNext runtime handles SSR, API routes, ISR, and image optimization automatically.
# No plugin pin needed — Netlify auto-updates the adapter on each build.
