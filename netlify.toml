[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Disable secrets scanner — the detected values (S3 region, bucket name, site URL)
# are public configuration, not secrets. The scanner flags them because they get
# baked into Next.js build output and AWS SDK bundled modules.
  SECRETS_SCAN_ENABLED = "false"

# OpenNext runtime handles SSR, API routes, ISR, and image optimization automatically.
# No plugin pin needed — Netlify auto-updates the adapter on each build.
